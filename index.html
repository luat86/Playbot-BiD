<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Playbot AI</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
    .box {
      border: 1px solid #ccc;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Playbot AI - Trợ lý pháp chế</h2>
  <button onclick="start()">Bắt đầu</button>
  <p id="output"></p>
</div>

<script>
function start() {
  document.getElementById("output").innerText = "Hệ thống đang hoạt động...";
}
</script>

</body>
</html>
